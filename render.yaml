services:
  - type: web
    name: punto-de-venta-backend
    runtime: node
    plan: free
    buildCommand: npm install --prefix backend
    startCommand: node backend/server.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://punto-de-venta-frontend.onrender.com

  - type: web
    name: punto-de-venta-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://punto-de-venta-backend.onrender.com/api
